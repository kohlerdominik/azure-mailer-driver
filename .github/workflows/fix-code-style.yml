name: Fix code style

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  pint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Pint
        run: ./vendor/bin/pint

      - name: Detect formatting changes
        id: formatting_changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit formatting changes
        if: steps.formatting_changes.outputs.changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '[Action] Fix code style'

      - name: Fail for fork PRs with formatting changes
        if: steps.formatting_changes.outputs.changed == 'true' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "Formatting changes were generated by Pint, but this pull request comes from a fork so the workflow cannot push fixes back to the branch."
          echo "Please run './vendor/bin/pint' locally, commit the changes, and push them to your pull request branch."
          echo ""
          echo "Alternatively, apply this patch:"
          echo ""
          git diff
          exit 1
